<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fábrica 2 - Dashboard de Consumo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1E293B">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                        },
                        industrial: {
                            orange: '#F97316',
                            blue: '#0EA5E9',
                            dark: '#1E293B'
                        },
                        fundo: '#F8FAFC'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace']
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-num { font-family: 'JetBrains Mono', monospace; }

        body {
            background-color: #F8FAFC;
        }

        ::-webkit-scrollbar { width: 6px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }

        /* Estilos base para inputs industriais (grandes e com alto contraste) */
        .input-industrial {
            background-color: #FFFFFF;
            border: 1px solid #CBD5E1;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: #1E293B;
            width: 100%;
            transition: all 0.2s;
        }
        .input-industrial:focus {
            outline: none;
            border-color: #F97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }

        .btn-primario {
            background-color: #F97316;
            color: white;
            font-weight: 700;
            transition: background-color 0.2s;
        }
        .btn-primario:hover { background-color: #EA580C; }
        .btn-primario:active { background-color: #C2410C; }

        .btn-secundario {
            background-color: #F1F5F9;
            color: #475569;
            font-weight: 600;
            border: 1px solid #E2E8F0;
            transition: all 0.2s;
        }
        .btn-secundario:hover { background-color: #E2E8F0; color: #1E293B; }

        .destaque-scan { animation: piscar 1.2s ease-in-out 2; }
        @keyframes piscar { 0%,100% { background-color: #FFFFFF; } 50% { background-color: #FFF7ED; border-color: #F97316; } }

        .toast-enter-active, .toast-leave-active { transition: all 0.3s ease; }
        .toast-enter-from { opacity: 0; transform: translateY(-12px); }
        .toast-leave-to { opacity: 0; transform: translateX(20px); }
    </style>
</head>
<body class="h-screen overflow-hidden bg-fundo text-slate-800">

<div id="app" class="w-full h-full flex flex-col md:flex-row relative">

    <div class="absolute top-4 inset-x-4 md:left-auto md:right-4 md:w-96 z-50 flex flex-col gap-2 pointer-events-none">
        <transition-group name="toast">
            <div v-for="toast in toasts" :key="toast.id"
                 class="pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg font-bold text-white text-sm"
                 :class="{
                    'bg-emerald-600': toast.tipo === 'sucesso',
                    'bg-red-600': toast.tipo === 'erro',
                    'bg-industrial-dark': toast.tipo === 'info'
                 }">
                <i class="fa-solid text-lg" :class="{
                    'fa-circle-check': toast.tipo === 'sucesso',
                    'fa-circle-exclamation': toast.tipo === 'erro',
                    'fa-circle-info': toast.tipo === 'info'
                }"></i>
                <span class="flex-1">{{ toast.mensagem }}</span>
                <button @click="removerToast(toast.id)" class="opacity-70 hover:opacity-100">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
        </transition-group>
    </div>

    <div v-if="!usuarioAtual" class="flex-1 flex flex-col justify-center items-center p-6 bg-slate-100">
      <div class="w-full max-w-md bg-white border border-slate-200 shadow-xl rounded-2xl p-8">
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-industrial-dark flex items-center justify-center mb-4 shadow-md">
                <i class="fa-solid fa-industry text-3xl text-industrial-orange"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Fábrica 2</h1>
            <p class="text-sm text-slate-500 font-medium mt-1">{{ modoRegistro ? 'Criar nova conta' : 'Acesso ao Sistema' }}</p>
        </div>

        <form @submit.prevent="modoRegistro ? registrar() : entrar()" class="w-full space-y-4">
            <div v-if="modoRegistro">
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Nome Completo</label>
                <input v-model="authForm.nome" type="text" required class="input-industrial">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">E-mail Operacional</label>
                <input v-model="authForm.email" type="email" required class="input-industrial">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wide">Senha</label>
                <input v-model="authForm.senha" type="password" required minlength="6" class="input-industrial">
            </div>

            <p v-if="authErro" class="text-red-500 text-xs font-bold bg-red-50 p-2 rounded">{{ authErro }}</p>

            <button type="submit" class="w-full btn-primario py-3.5 rounded-xl text-lg mt-2 shadow-md">
                {{ modoRegistro ? 'Cadastrar' : 'Entrar' }}
            </button>
        </form>

        <div class="text-center mt-6 pt-6 border-t border-slate-100">
            <button @click="modoRegistro = !modoRegistro; authErro = null" class="text-sm text-industrial-blue font-bold hover:underline">
                {{ modoRegistro ? 'Já possuo acesso' : 'Solicitar novo acesso' }}
            </button>
        </div>
      </div>
    </div>

    <template v-else>
        <aside class="hidden md:flex md:flex-col md:w-64 bg-slate-900 text-slate-300 p-5 shrink-0 h-full border-r border-slate-800">
            <h1 class="text-xl font-extrabold text-white tracking-wide mb-8 flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-industrial-orange flex items-center justify-center text-white shadow-md">
                    <i class="fa-solid fa-industry text-sm"></i>
                </div>
                Fábrica 2
            </h1>
            <nav class="flex flex-col gap-2 flex-1">
                <button @click="irPara('dashboard')" :class="abaAtiva === 'dashboard' ? 'bg-industrial-orange text-white' : 'hover:bg-slate-800 hover:text-white'" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-colors">
                    <i class="fa-solid fa-chart-line w-5 text-center"></i> Painel Geral
                </button>
                <button v-if="podeCadastrarProduto" @click="irPara('cadastro')" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-colors hover:bg-slate-800 hover:text-white">
                    <i class="fa-solid fa-plus w-5 text-center"></i> Cadastrar Insumo
                </button>
                <button @click="irPara('auditoria')" :class="abaAtiva === 'auditoria' ? 'bg-industrial-orange text-white' : 'hover:bg-slate-800 hover:text-white'" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-colors">
                    <i class="fa-solid fa-clipboard-check w-5 text-center"></i> Auditoria Física
                </button>
                <button @click="irPara('alertas')" :class="abaAtiva === 'alertas' ? 'bg-industrial-orange text-white' : 'hover:bg-slate-800 hover:text-white'" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm relative transition-colors">
                    <i class="fa-solid fa-bell w-5 text-center"></i> Alertas
                    <span v-if="alertasNaoLidos.length > 0" class="ml-auto bg-red-500 text-white text-[10px] font-black rounded-full px-2 py-0.5 shadow-sm">{{ alertasNaoLidos.length > 9 ? '9+' : alertasNaoLidos.length }}</span>
                </button>
                <button v-if="souAdmin" @click="irPara('relatorios')" :class="abaAtiva === 'relatorios' ? 'bg-industrial-orange text-white' : 'hover:bg-slate-800 hover:text-white'" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-colors">
                    <i class="fa-solid fa-file-export w-5 text-center"></i> Relatórios
                </button>
                <button v-if="podeVerLogs" @click="irPara('logs')" :class="abaAtiva === 'logs' ? 'bg-industrial-orange text-white' : 'hover:bg-slate-800 hover:text-white'" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-colors">
                    <i class="fa-solid fa-clock-rotate-left w-5 text-center"></i> Histórico
                </button>
                <button v-if="podeCadastrarPessoa" @click="irPara('pessoas')" :class="abaAtiva === 'pessoas' ? 'bg-industrial-orange text-white' : 'hover:bg-slate-800 hover:text-white'" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-sm transition-colors">
                    <i class="fa-solid fa-users-gear w-5 text-center"></i> {{ souAdmin ? 'Acessos' : 'Pessoas' }}
                </button>
            </nav>
            <div class="border-t border-slate-800 pt-5 mt-4">
                <span class="text-[10px] bg-slate-800 text-slate-300 border border-slate-700 px-2 py-1 rounded font-bold uppercase inline-block mb-3">{{ perfil || '...' }}</span>
                <button @click="sair" class="w-full flex items-center justify-center gap-2 text-sm font-bold bg-slate-800 hover:bg-red-900/50 hover:text-red-400 py-3 rounded-xl transition-colors">
                    <i class="fa-solid fa-right-from-bracket"></i> Encerrar Sessão
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden relative">

        <header class="md:hidden bg-slate-900 text-white p-4 z-10 flex justify-between items-center relative shadow-md">
            <h1 class="text-xl font-extrabold tracking-wide flex items-center gap-2">
                <span class="text-industrial-orange"><i class="fa-solid fa-industry"></i></span> Fábrica 2
            </h1>
            <div class="flex items-center gap-3">
                <button @click="irPara('alertas')" class="relative text-slate-300 text-xl px-1">
                    <i class="fa-solid fa-bell"></i>
                    <span v-if="alertasNaoLidos.length > 0" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold rounded-full px-1.5 py-0.5 border-2 border-slate-900">
                        {{ alertasNaoLidos.length > 9 ? '9+' : alertasNaoLidos.length }}
                    </span>
                </button>
                <button @click="menuAberto = !menuAberto" class="text-white text-2xl px-1">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>

            <div v-if="menuAberto" class="absolute right-2 top-16 bg-white border border-slate-200 text-slate-800 rounded-xl shadow-2xl w-56 z-30 overflow-hidden">
                <div class="px-4 py-3 border-b border-slate-100 bg-slate-50">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Usuário Atual</span>
                    <p class="text-sm font-bold text-industrial-dark capitalize">{{ perfil }}</p>
                </div>
                <button @click="irPara('alertas')" class="w-full text-left px-4 py-3.5 text-sm font-semibold hover:bg-slate-50 flex items-center gap-3">
                    <i class="fa-solid fa-bell text-industrial-orange w-4"></i> Alertas
                </button>
                <button v-if="souAdmin" @click="irPara('relatorios')" class="w-full text-left px-4 py-3.5 text-sm font-semibold hover:bg-slate-50 flex items-center gap-3">
                    <i class="fa-solid fa-file-export text-industrial-blue w-4"></i> Relatórios
                </button>
                <button v-if="podeVerLogs" @click="irPara('logs')" class="w-full text-left px-4 py-3.5 text-sm font-semibold hover:bg-slate-50 flex items-center gap-3">
                    <i class="fa-solid fa-clock-rotate-left text-slate-500 w-4"></i> Histórico
                </button>
                <button v-if="podeCadastrarPessoa" @click="irPara('pessoas')" class="w-full text-left px-4 py-3.5 text-sm font-semibold hover:bg-slate-50 flex items-center gap-3">
                    <i class="fa-solid fa-users-gear text-slate-500 w-4"></i> Acessos
                </button>
                <button @click="sair" class="w-full text-left px-4 py-3.5 text-sm font-bold bg-red-50 hover:bg-red-100 text-red-600 flex items-center gap-3 border-t border-slate-100">
                    <i class="fa-solid fa-power-off w-4"></i> Sair
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-24 md:pb-6" @click="menuAberto = false">

            <div v-if="abaAtiva === 'dashboard'" class="animate-fade-in max-w-7xl mx-auto">
                <div class="flex flex-col md:flex-row md:items-end justify-between mb-6 gap-4">
                    <div>
                        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Visão Geral da Produção</h2>
                        <p class="text-sm text-slate-500 font-medium mt-1">Acompanhamento de estoque e KPIs</p>
                    </div>
                    
                    <div v-if="unidadesFabris.length > 1" class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-2 shadow-sm">
                        <i class="fa-solid fa-building text-slate-400 text-sm"></i>
                        <select v-model="unidadeFabrilSelecionada" class="text-sm font-bold text-slate-700 focus:outline-none bg-transparent">
                            <option :value="null">Todas as unidades</option>
                            <option v-for="u in unidadesFabris" :key="u" :value="u">{{ u }}</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                        <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Total Insumos</p>
                        <p class="font-num text-3xl font-extrabold text-slate-900">{{ kpis.totalInsumos }}</p>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                        <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Custo Acumulado</p>
                        <p class="font-num text-2xl font-extrabold text-slate-900">R$ {{ kpis.custoTotalAcumulado.toFixed(0) }}</p>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm col-span-2 md:col-span-1">
                        <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Mais Consumido (ano)</p>
                        <p class="text-base font-bold text-industrial-blue truncate mt-1">{{ kpis.maisConsumido ? kpis.maisConsumido.nome : '-' }}</p>
                    </div>
                    <div class="bg-red-50 border border-red-100 rounded-xl p-4 shadow-sm">
                        <p class="text-xs text-red-600 font-bold uppercase tracking-wider mb-1">Estoque Crítico</p>
                        <p class="font-num text-3xl font-extrabold text-red-600">{{ alertasCriticos.length }}</p>
                    </div>
                </div>

                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex flex-col sm:flex-row gap-3 mb-6">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input v-model="buscaTexto" type="text" placeholder="Buscar insumo por nome..." class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-industrial-orange focus:ring-1 focus:ring-industrial-orange transition-colors">
                    </div>
                    <select v-model="ordenacao" class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-sm font-medium focus:outline-none focus:border-industrial-orange">
                        <option value="nome-asc">Nome (A-Z)</option>
                        <option value="estoque-asc">Estoque (menor primeiro)</option>
                        <option value="estoque-desc">Estoque (maior primeiro)</option>
                        <option value="dias-asc">Dias restantes (menor)</option>
                    </select>
                </div>

                <div v-if="categorias.length > 0" class="flex gap-2 overflow-x-auto mb-6 pb-2">
                    <button @click="filtroCategoria = null" :class="!filtroCategoria ? 'bg-slate-800 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'" class="text-xs px-4 py-2 rounded-full whitespace-nowrap font-bold transition-all">Todas</button>
                    <button v-for="cat in categorias" :key="cat" @click="filtroCategoria = cat"
                            :class="filtroCategoria === cat ? 'bg-slate-800 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'"
                            class="text-xs px-4 py-2 rounded-full whitespace-nowrap font-bold transition-all">{{ cat }}</button>
                </div>

                <div v-if="carregando" class="flex flex-col justify-center items-center h-40 text-slate-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-industrial-orange"></i>
                    <p class="font-medium">Sincronizando com o banco...</p>
                </div>

                <div v-else class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                    <div v-for="insumo in insumosFiltrados" :key="insumo.id" 
                         class="bg-white rounded-xl border p-5 flex flex-col shadow-sm hover:shadow-md transition-shadow relative overflow-hidden"
                         :class="insumo.diasRestantes <= (insumo.estoqueMinimoDias || 5) ? 'border-red-300' : 'border-slate-200'">
                        
                        <div class="absolute left-0 top-0 bottom-0 w-1.5" :class="obterCorStatus(insumo)"></div>

                        <div class="flex justify-between items-start mb-3 pl-2">
                            <div class="pr-2">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">{{ insumo.categoria || 'Geral' }}</span>
                                <h3 class="font-extrabold text-slate-900 text-lg leading-tight">{{ insumo.nome }}</h3>
                            </div>
                            
                            <span v-if="insumo.diasRestantes !== null && insumo.diasRestantes <= (insumo.estoqueMinimoDias || 5)" 
                                  class="inline-flex items-center px-2 py-1 rounded bg-red-100 text-red-700 text-[10px] font-black uppercase tracking-wider border border-red-200 animate-pulse whitespace-nowrap">
                                Crítico
                            </span>
                            <span v-else 
                                  class="inline-flex items-center px-2 py-1 rounded bg-emerald-50 text-emerald-700 text-[10px] font-black uppercase tracking-wider border border-emerald-200 whitespace-nowrap">
                                Normal
                            </span>
                        </div>

                        <div class="bg-slate-50 rounded-lg p-4 border border-slate-100 mb-4 ml-2">
                            <div class="flex justify-between items-baseline mb-2">
                                <p class="text-xs font-bold text-slate-500 uppercase">Estoque Atual</p>
                                <div class="text-right">
                                    <span class="font-num font-black text-3xl text-slate-900">{{ insumo.estoqueAtual }}</span>
                                    <span class="text-sm font-bold text-slate-500 ml-1">{{ insumo.unidade }}</span>
                                </div>
                            </div>
                            <div class="flex justify-between items-center text-sm pt-2 border-t border-slate-200/60">
                                <span class="text-slate-500">Previsão Fim:</span>
                                <span class="font-bold text-slate-800">
                                    {{ insumo.diasRestantes !== null ? insumo.diasRestantes.toFixed(1) + ' dias' : 'Calculando...' }}
                                </span>
                            </div>
                        </div>

                        <div class="mt-auto ml-2">
                            <button @click="insumo.mostrarGrafico = !insumo.mostrarGrafico" class="w-full text-center text-sm font-bold text-slate-600 bg-white border border-slate-300 py-2.5 rounded-lg hover:bg-slate-50 transition-colors flex items-center justify-center gap-2">
                                <i class="fa-solid" :class="insumo.mostrarGrafico ? 'fa-chevron-up' : 'fa-chart-column'"></i>
                                {{ insumo.mostrarGrafico ? 'Ocultar Histórico' : 'Ver Histórico' }}
                            </button>

                            <div v-if="insumo.mostrarGrafico" class="mt-4 pt-4 border-t border-slate-200">
                                <chart-consumo :historico="insumo.historico" :unidade="insumo.unidade"></chart-consumo>
                            </div>

                            <div v-if="podeEditarExcluir" class="flex gap-2 mt-3 pt-3 border-t border-slate-100">
                                <button @click="abrirEdicao(insumo)" class="flex-1 text-xs font-bold text-slate-700 bg-slate-100 py-2.5 rounded hover:bg-slate-200 transition-colors">
                                    <i class="fa-solid fa-pen mr-1"></i> Editar
                                </button>
                                <button @click="excluirInsumo(insumo)" class="flex-1 text-xs font-bold text-red-700 bg-red-50 border border-red-100 py-2.5 rounded hover:bg-red-100 transition-colors">
                                    <i class="fa-solid fa-trash mr-1"></i> Excluir
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="abaAtiva === 'cadastro' && podeCadastrarProduto" class="animate-fade-in max-w-2xl mx-auto">
                <div class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 md:p-8">
                    <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight mb-2">Novo Insumo</h2>
                    <p class="text-sm text-slate-500 font-medium mb-6 pb-6 border-b border-slate-100">Cadastre um novo material na base de dados.</p>
                    
                    <form @submit.prevent="salvarInsumo" class="space-y-5">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Nome do Insumo *</label>
                            <input v-model="form.nome" type="text" required class="input-industrial">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Categoria</label>
                                <input v-model="form.categoria" type="text" placeholder="Ex: Argila" class="input-industrial">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Unidade de Medida *</label>
                                <select v-model="form.unidade" class="input-industrial">
                                    <option value="kg">Quilogramas (kg)</option>
                                    <option value="litros">Litros (L)</option>
                                    <option value="unidades">Unidades (un)</option>
                                    <option value="ton">Toneladas (ton)</option>
                                    <option value="metros">Metros (m)</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Estoque Inicial</label>
                                <input v-model.number="form.estoqueAtual" type="number" step="0.01" min="0" class="input-industrial font-num text-lg">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Alerta Mínimo (Dias)</label>
                                <input v-model.number="form.estoqueMinimoDias" type="number" step="1" min="0" class="input-industrial font-num text-lg">
                            </div>
                        </div>
                        
                        <div class="pt-4 border-t border-slate-100 mt-2">
                            <button type="submit" class="w-full btn-primario py-4 rounded-xl text-lg flex items-center justify-center gap-2 shadow-md">
                                <i class="fa-solid fa-check"></i> Finalizar Cadastro
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div v-if="abaAtiva === 'auditoria'" class="animate-fade-in max-w-4xl mx-auto">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <h2 class="text-2xl font-extrabold text-slate-900 tracking-tight">Auditoria Física</h2>
                        <p class="text-sm text-slate-500 font-medium mt-1">Ajuste de contagem real (Chão de fábrica)</p>
                    </div>
                    <button @click="abrirScanner" class="btn-secundario px-4 py-2.5 rounded-lg flex items-center gap-2 shadow-sm border border-slate-300">
                        <i class="fa-solid fa-barcode text-slate-700"></i> <span class="hidden sm:inline">Ler Código</span>
                    </button>
                </div>

                <div v-for="insumo in insumosDaUnidade" :key="'auditoria-'+insumo.id" :id="'auditoria-'+insumo.id"
                     class="bg-white border border-slate-200 rounded-xl p-4 mb-3 flex items-center justify-between shadow-sm">
                    <div class="flex-1 pr-4">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{{ insumo.categoria }}</span>
                        <h3 class="font-bold text-slate-900 text-lg leading-tight mt-0.5">{{ insumo.nome }}</h3>
                        <p class="text-xs text-slate-500 mt-1 font-medium">Sistema: <span class="font-num text-slate-700">{{ insumo.estoqueAtual }}</span> {{ insumo.unidade }}</p>
                    </div>
                    <div class="w-32 flex flex-col items-end">
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-1">Físico Atual</label>
                        <input type="number" step="0.01" v-model.number="insumo.novoEstoque" 
                               class="w-24 bg-slate-50 border-2 border-slate-300 text-center font-num font-black text-2xl text-industrial-orange rounded-lg py-2 focus:outline-none focus:border-industrial-orange focus:bg-white transition-colors">
                    </div>
                </div>

                <div class="sticky bottom-20 md:bottom-6 mt-8">
                    <button v-if="insumosDaUnidade.length > 0" @click="salvarAuditoria" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-4 rounded-xl shadow-xl flex items-center justify-center gap-3 transition-colors text-lg">
                        <i class="fa-solid fa-save"></i> Gravar Auditoria
                    </button>
                </div>

                <div v-if="scannerAberto" class="fixed inset-0 bg-slate-900/90 z-50 flex flex-col justify-center items-center p-4 backdrop-blur-sm">
                    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
                        <h3 class="text-lg font-bold text-slate-900 text-center mb-4">Câmera de Leitura</h3>
                        <div id="leitor-codigo" class="w-full rounded-xl overflow-hidden border-2 border-slate-200"></div>
                        <button @click="fecharScanner" class="w-full mt-6 btn-secundario py-3 rounded-xl font-bold">Cancelar</button>
                    </div>
                </div>
            </div>

            </main>

        <nav class="md:hidden absolute bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center h-16 shadow-[0_-4px_15px_rgba(0,0,0,0.03)] z-40 pb-safe">
            <button @click="irPara('dashboard')" :class="{'text-industrial-orange': abaAtiva === 'dashboard', 'text-slate-400': abaAtiva !== 'dashboard'}" class="flex flex-col items-center w-1/3 py-2 transition-colors">
                <i class="fa-solid fa-chart-line text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Geral</span>
            </button>
            <button v-if="podeCadastrarProduto" @click="irPara('cadastro')" class="relative -top-6 flex flex-col items-center w-14 h-14 bg-industrial-orange text-white rounded-full justify-center shadow-lg border-4 border-white transition-transform active:scale-95">
                <i class="fa-solid fa-plus text-2xl"></i>
            </button>
            <button @click="irPara('auditoria')" :class="{'text-industrial-orange': abaAtiva === 'auditoria', 'text-slate-400': abaAtiva !== 'auditoria'}" class="flex flex-col items-center w-1/3 py-2 transition-colors">
                <i class="fa-solid fa-clipboard-check text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Auditoria</span>
            </button>
        </nav>
        
    </template>
</div>
